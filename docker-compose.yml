version: '3.8'

services:
  web:
    image: nginx:alpine
    container_name: erp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443" # Uncomment if using SSL
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
      - frontend
    networks:
      - erp_network

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp_backend
    restart: unless-stopped
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    volumes:
      - ./backend:/var/www/backend
      - erp_uploads:/var/www/backend/public/uploads
    networks:
      - erp_network
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: erp_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
    networks:
      - erp_network

  db:
    image: postgres:15-alpine
    container_name: erp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-erp_production}
      POSTGRES_USER: ${DB_USERNAME:-erp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - erp_db_data:/var/lib/postgresql/data
    networks:
      - erp_network
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: erp_redis
    restart: unless-stopped
    networks:
      - erp_network
    volumes:
      - erp_redis_data:/data

networks:
  erp_network:
    driver: bridge

volumes:
  erp_db_data:
  erp_redis_data:
  erp_uploads:
