name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
    - uses: actions/checkout@v4
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, iconv, json, libxml, pdo
    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
    - name: Copy .env
      run: cp .env.example .env
    - name: Generate key
      run: php artisan key:generate
    - name: Run Tests
      run: php artisan test

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Type Check
      run: npm run typecheck || true
    - name: Build
      run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: pdo_sqlite, pdo, sqlite3
    
    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
    
    - name: Prepare Environment
      run: |
        cp .env.example .env
        php artisan key:generate
        touch database/database.sqlite
    
    - name: Enforce Pre-Deployment Snapshot
      run: php artisan deploy:snapshot
      
    - name: Execute Migrations
      id: migrate
      run: php artisan migrate --force
      continue-on-error: true
      
    - name: Automatic Rollback on Migration Failure
      if: steps.migrate.outcome == 'failure'
      run: |
        echo "Migration failed! Initiating automatic rollback..."
        php artisan deploy:snapshot-rollback
        exit 1 # Fail the pipeline so the team knows the deployment failed
